http_timeout_seconds: 10
max_concurrent_requests: 3
users:
- name: admin_user
  variables:
    username: admin_user
    password: admin-pass
- name: editor_user
  variables:
    username: editor_user
    password: editor-pass
- name: viewer_user
  variables:
    username: viewer_user
    password: viewer-pass
login_sequence:
- request:
    method: POST
    url: http://127.0.0.1:5000/auth/login
    json:
      username: '{{username}}'
      password: '{{password}}'
  extract:
    access_token:
      from: json
      path: token
authorization_tests:
- name: report-admin-finance-idor
  request:
    method: GET
    url: http://127.0.0.1:5000/api/reports/report-admin-finance
    headers:
      Authorization: Bearer {{access_token}}
  expectations:
    allowed_users:
    - admin_user
- name: me-profile-self-access
  request:
    method: GET
    url: http://127.0.0.1:5000/api/me/profile
    headers:
      Authorization: Bearer {{access_token}}
  expectations:
    allowed_users:
    - admin_user
    - editor_user
    - viewer_user
