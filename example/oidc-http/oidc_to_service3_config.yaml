users:
  - name: admin_user
    variables:
      username: admin_user
      password: admin-pass
  - name: editor_user
    variables:
      username: editor_user
      password: editor-pass
  - name: viewer_user
    variables:
      username: viewer_user
      password: viewer-pass
login_sequence:
  - request:
      method: GET
      url: "http://localhost:5000/authorize?client_id=demo-client&redirect_uri=http://localhost:5000/callback&response_type=code&scope=openid&state=xyz&username={{username}}&password={{password}}"
    extract:
      auth_code:
        from: header
        name: Location
        pattern: "code=([a-f0-9\\-]+)"
  - request:
      method: POST
      url: "http://localhost:5000/token"
      body: "code={{auth_code}}&client_id=demo-client&redirect_uri=http://localhost:5000/callback&grant_type=authorization_code"
      headers:
        Content-Type: application/x-www-form-urlencoded
    extract:
      access_token:
        from: json
        path: access_token
authorization_tests:
  - name: service3-resource-access
    request:
      method: GET
      url: "http://localhost:8080/protected-resource"
      headers:
        Authorization: "Bearer {{access_token}}"
    expectations:
      allowed_users: [admin_user, editor_user, viewer_user]
  - name: service3-public
    request:
      method: GET
      url: "http://localhost:8080/public"
    expectations:
      allowed_users: [admin_user, editor_user, viewer_user]
