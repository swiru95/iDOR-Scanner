users:
- name: admin_user
  variables:
    username: admin_user
    password: admin-pass
- name: editor_user
  variables:
    username: editor_user
    password: editor-pass
- name: viewer_user
  variables:
    username: viewer_user
    password: viewer-pass
login_sequence:
- request:
    method: POST
    url: http://localhost:5001/login
    json:
      username: '{{username}}'
      password: '{{password}}'
  extract:
    access_token:
      from: json
      path: token
openapi_spec_path: example/post-http/flask_post_demo_openapi.json
